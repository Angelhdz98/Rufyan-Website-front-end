name: Deploy Frontend

on:
  push:
    branches: [ "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
      - name: Run tests
        run: |
          cd Backend-RufyanWS
          ./mvnw clean test
  deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/RufyanWebSite/Rufyan-Website-front-end

            echo "Pull cambios del repo principal"
            git pull origin master
            
            cd ../

            echo "Build nginx"
            docker compose build nginx
            
            echo "Restart nginx"
            docker compose up -d nginx
